<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lilita+One&display=swap');

:root {
  --black:   #0f0f0f;
  --violet:  #2d0a4e;
  --violet2: #4a1278;
  --violet3: #7c3aed;
  --light:   #f3eeff;
  --white:   #ffffff;
  --gray:    #e8e8f0;
  --gray2:   #a0a0b8;
  --border:  #e2ddf0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { font-family: 'Nunito', sans-serif; background: var(--white); color: var(--black); display: flex; }

/* ══════════════════
   LOGIN SCREEN
══════════════════ */
#login-screen {
  position: fixed; inset: 0; background: var(--white);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 0;
}

.login-logo {
  font-family: 'Lilita One', cursive;
  font-size: 48px; color: var(--violet);
  margin-bottom: 8px;
  letter-spacing: -1px;
}
.login-sub {
  font-size: 14px; font-weight: 700; color: var(--gray2);
  margin-bottom: 52px; letter-spacing: 0.5px;
}
.login-label {
  font-size: 11px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; color: var(--gray2); margin-bottom: 16px;
}
.login-choices { display: flex; gap: 16px; }

.login-card {
  width: 180px; padding: 32px 20px;
  border: 2px solid var(--border);
  border-radius: 24px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  background: var(--white); transition: all 0.2s;
}
.login-card:hover {
  border-color: var(--violet3);
  background: var(--light);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(124,58,237,0.12);
}
.login-card-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--violet); color: white;
  font-family: 'Lilita One', cursive; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: -1px;
}
.login-card-name {
  font-family: 'Lilita One', cursive;
  font-size: 20px; color: var(--violet);
}
.login-card-btn {
  width: 100%; padding: 10px;
  background: var(--violet); color: white; border: none;
  border-radius: 50px; font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: 13px; cursor: pointer;
  transition: background 0.2s;
}
.login-card:hover .login-card-btn { background: var(--violet3); }

/* ══════════════════
   SIDEBAR
══════════════════ */
.sidebar {
  width: 260px; min-width: 260px; height: 100vh;
  background: var(--violet);
  display: flex; flex-direction: column;
  border-right: none;
}

.sidebar-header {
  padding: 32px 24px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sidebar-logo {
  font-family: 'Lilita One', cursive;
  font-size: 22px; color: white; margin-bottom: 4px;
}
.sidebar-who {
  display: flex; align-items: center; gap: 8px;
  margin-top: 14px;
}
.sidebar-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: white; font-family: 'Lilita One', cursive; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(255,255,255,0.3);
}
.sidebar-who-name { font-weight: 800; font-size: 14px; color: white; }
.sidebar-who-role { font-size: 11px; color: rgba(255,255,255,0.55); font-weight: 700; }

.sidebar-nav { flex: 1; padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-label { font-size: 9px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); padding: 0 12px; margin-bottom: 6px; margin-top: 4px; }

.nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px;
  color: rgba(255,255,255,0.6); border: none; background: none;
  cursor: pointer; width: 100%; text-align: left; transition: all 0.15s;
}
.nav-btn:hover { background: rgba(255,255,255,0.08); color: white; }
.nav-btn.active { background: rgba(255,255,255,0.15); color: white; }
.nav-btn .nb-icon { font-size: 18px; width: 24px; text-align: center; }

.live-dot {
  margin-left: auto; width: 8px; height: 8px; border-radius: 50%;
  background: #4ade80; box-shadow: 0 0 6px #4ade80;
}
.live-dot.off { background: #f87171; box-shadow: 0 0 6px #f87171; }

.sidebar-footer {
  padding: 16px 12px 24px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.switch-user-btn {
  width: 100%; padding: 10px 14px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; color: rgba(255,255,255,0.7);
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
  cursor: pointer; transition: all 0.15s; text-align: left;
  display: flex; align-items: center; gap: 8px;
}
.switch-user-btn:hover { background: rgba(255,255,255,0.14); color: white; }

/* ══════════════════
   MAIN
══════════════════ */
.main { flex: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ── TOPBAR ── */
.topbar {
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  background: var(--white);
}
.topbar-title { font-family: 'Lilita One', cursive; font-size: 20px; color: var(--violet); }
.topbar-sub { font-size: 12px; font-weight: 700; color: var(--gray2); margin-top: 1px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

/* ── MESSAGES ── */
#messages {
  flex: 1; overflow-y: auto; padding: 28px;
  display: flex; flex-direction: column; gap: 14px;
  background: var(--white);
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.msg-group { display: flex; flex-direction: column; gap: 2px; }
.msg-group.me { align-items: flex-end; }
.msg-group.other { align-items: flex-start; }

.msg-sender {
  font-size: 11px; font-weight: 900; letter-spacing: 0.5px;
  padding: 0 14px; margin-bottom: 4px;
  text-transform: uppercase;
}
.other .msg-sender { color: var(--gray2); }
.me .msg-sender { color: var(--violet3); }

.bubble {
  max-width: 62%; padding: 12px 18px;
  font-size: 15px; font-weight: 600; line-height: 1.55;
  word-break: break-word;
  animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

/* Messages de l'AUTRE */
.other .bubble {
  background: var(--light);
  border-radius: 4px 20px 20px 20px;
  color: var(--violet);
  border: 1px solid var(--border);
}
/* Mes messages (moi) */
.me .bubble {
  background: var(--violet);
  border-radius: 20px 4px 20px 20px;
  color: white;
}

.bubble .ts {
  font-size: 10px; font-weight: 700; opacity: 0.45;
  display: block; margin-top: 4px;
}
.other .bubble .ts { text-align: left; }
.me .bubble .ts { text-align: right; }

.date-sep {
  text-align: center; font-size: 11px; font-weight: 800;
  color: var(--gray2); padding: 4px 0;
  display: flex; align-items: center; gap: 12px;
}
.date-sep::before,.date-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* TYPING */
.typing-wrap { display: none; align-items: center; gap: 8px; padding: 0 28px 8px; }
.typing-wrap.visible { display: flex; }
.typing-dots {
  background: var(--light); border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 10px 16px; display: flex; gap: 4px; align-items: center;
}
.td { width: 6px; height: 6px; border-radius: 50%; background: var(--violet3); animation: bounce 1.2s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.typing-name { font-size: 12px; font-weight: 800; color: var(--gray2); }

/* INPUT */
.input-area {
  padding: 14px 28px 20px;
  border-top: 1px solid var(--border);
  background: var(--white);
}
.emoji-strip { display: flex; gap: 2px; padding-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
.emoji-strip::-webkit-scrollbar { display: none; }
.ep { font-size: 19px; cursor: pointer; padding: 3px 4px; border-radius: 6px; flex-shrink: 0; transition: transform 0.15s; }
.ep:hover { transform: scale(1.3); background: var(--light); }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
#msg-input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 16px;
  padding: 12px 18px; font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 600; outline: none;
  resize: none; max-height: 110px; line-height: 1.4;
  color: var(--black); background: var(--light);
  transition: border-color 0.2s;
}
#msg-input:focus { border-color: var(--violet3); }
#msg-input::placeholder { color: var(--gray2); }

.send-btn {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: var(--violet); color: white; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.15s; flex-shrink: 0;
}
.send-btn:hover { background: var(--violet3); transform: scale(1.07); }
.send-btn:active { transform: scale(0.93); }

/* STICKER POPUP */
.sticker-popup {
  position: fixed; bottom: 88px; left: 272px;
  background: var(--white); border-radius: 18px;
  padding: 12px; box-shadow: 0 8px 32px rgba(45,10,78,0.15);
  border: 1.5px solid var(--border);
  display: none; grid-template-columns: repeat(6,1fr); gap: 6px;
  z-index: 200;
}
.sticker-popup.open { display: grid; }
.so { font-size: 22px; cursor: pointer; text-align: center; padding: 5px; border-radius: 8px; transition: transform 0.15s, background 0.15s; }
.so:hover { transform: scale(1.3); background: var(--light); }

/* ══════════════════
   CAPSULE VIEW
══════════════════ */
.cap-inner { flex: 1; overflow-y: auto; padding: 32px 40px; display: flex; flex-direction: column; gap: 28px; background: var(--white); }
.cap-inner::-webkit-scrollbar { width: 4px; }
.cap-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 28px 32px;
}
.card-title {
  font-family: 'Lilita One', cursive; font-size: 17px;
  color: var(--violet); margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}

.cap-form { display: flex; flex-direction: column; gap: 14px; }
.cap-form textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: 14px;
  padding: 14px 18px; font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 600; color: var(--black);
  background: var(--light); outline: none; resize: vertical;
  min-height: 100px; line-height: 1.55; transition: border-color 0.2s;
}
.cap-form textarea:focus { border-color: var(--violet3); }
.cap-form textarea::placeholder { color: var(--gray2); }

.form-row { display: flex; gap: 14px; flex-wrap: wrap; }
.form-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 130px; }
.form-label { font-size: 10px; font-weight: 900; color: var(--gray2); letter-spacing: 1.5px; text-transform: uppercase; }
.form-field select, .form-field input {
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 10px 14px; font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--black);
  background: var(--light); outline: none; transition: border-color 0.2s;
}
.form-field select:focus, .form-field input:focus { border-color: var(--violet3); }

.seal-btn {
  background: var(--violet); color: white; border: none;
  border-radius: 50px; padding: 13px 28px;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px;
  cursor: pointer; transition: background 0.15s; align-self: flex-start;
}
.seal-btn:hover { background: var(--violet3); }

.caps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 14px; }
.cap-card {
  border: 1.5px solid var(--border); border-radius: 16px;
  padding: 20px 22px; transition: transform 0.15s, box-shadow 0.15s;
  background: var(--white);
}
.cap-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,10,78,0.08); }
.cap-card.locked { border-left: 4px solid var(--violet2); }
.cap-card.unlocked { border-left: 4px solid #4ade80; }

.cap-card-icon { font-size: 28px; margin-bottom: 8px; }
.cap-card-status {
  font-size: 10px; font-weight: 900; letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 6px;
}
.locked .cap-card-status { color: var(--violet2); }
.unlocked .cap-card-status { color: #16a34a; }
.cap-card-from { font-size: 13px; font-weight: 800; color: var(--violet); margin-bottom: 3px; }
.cap-card-date { font-size: 12px; font-weight: 700; color: var(--gray2); }
.cap-card-hint { margin-top: 10px; font-size: 12px; font-weight: 600; color: var(--gray2); font-style: italic; }
.open-cap-btn {
  margin-top: 14px; width: 100%;
  background: var(--violet); color: white; border: none; border-radius: 50px;
  padding: 10px; font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 13px; cursor: pointer; transition: background 0.15s;
}
.open-cap-btn:hover { background: var(--violet3); }
.empty-caps {
  grid-column: 1/-1; text-align: center; padding: 40px;
  color: var(--gray2); font-weight: 700; font-size: 14px;
}
.empty-caps span { font-size: 40px; display: block; margin-bottom: 10px; }

/* ══════════════════
   MODAL
══════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,15,15,0.4);
  backdrop-filter: blur(6px); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--white); border-radius: 24px; padding: 36px;
  max-width: 440px; width: 90%;
  box-shadow: 0 20px 60px rgba(45,10,78,0.2);
  border: 1.5px solid var(--border);
  transform: translateY(16px) scale(0.96);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
.modal-icon { font-size: 44px; text-align: center; margin-bottom: 10px; }
.modal-title { font-family: 'Lilita One', cursive; font-size: 22px; color: var(--violet); text-align: center; margin-bottom: 8px; }
.modal-body { font-size: 14px; font-weight: 600; color: var(--gray2); text-align: center; line-height: 1.6; margin-bottom: 16px; }
.modal-msg {
  background: var(--light); border-radius: 14px; padding: 16px 20px;
  font-size: 15px; font-weight: 600; color: var(--violet);
  line-height: 1.65; margin-bottom: 20px;
  border: 1px solid var(--border); white-space: pre-wrap; text-align: left;
}
.modal-close {
  width: 100%; background: var(--violet); color: white; border: none;
  border-radius: 50px; padding: 14px; font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 15px; cursor: pointer; transition: background 0.15s;
}
.modal-close:hover { background: var(--violet3); }

/* TOAST */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--violet); color: white;
  border-radius: 12px; padding: 10px 18px;
  font-size: 13px; font-weight: 800;
  box-shadow: 0 6px 24px rgba(45,10,78,0.25);
  z-index: 800; opacity: 0; transform: translateY(12px);
  transition: all 0.25s; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-msg" id="modal-msg" style="display:none"></div>
    <button class="modal-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

<!-- STICKER POPUP -->
<div class="sticker-popup" id="sticker-popup"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-logo">Alice & Lénaïc</div>
  <div class="login-sub">votre espace privé</div>
  <div class="login-label">je suis...</div>
  <div class="login-choices">
    <div class="login-card" onclick="login('alice')">
      <div class="login-card-avatar">A</div>
      <div class="login-card-name">Alice</div>
      <button class="login-card-btn">C'est moi →</button>
    </div>
    <div class="login-card" onclick="login('lenaic')">
      <div class="login-card-avatar">L</div>
      <div class="login-card-name">Lénaïc</div>
      <button class="login-card-btn">C'est moi →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Alice & Lénaïc</div>
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);margin-bottom:14px">espace privé</div>
    <div class="sidebar-who">
      <div class="sidebar-av" id="sb-av">A</div>
      <div>
        <div class="sidebar-who-name" id="sb-name">—</div>
        <div class="sidebar-who-role" id="sb-status">connexion...</div>
      </div>
    </div>
  </div>

  <div class="sidebar-nav">
    <div class="nav-label">Espaces</div>
    <button class="nav-btn active" id="nav-cha" onclick="switchView('chat')">
      <span class="nb-icon">💬</span> Messagerie
      <span class="live-dot" id="live-dot"></span>
    </button>
    <button class="nav-btn" id="nav-cap" onclick="switchView('capsule')">
      <span class="nb-icon">⏳</span> Capsule temporelle
    </button>
  </div>

  <div class="sidebar-footer">
    <button class="switch-user-btn" onclick="switchUser()">
      ↩ Changer d'utilisateur
    </button>
  </div>
</div>

<div class="main">

  <!-- CHAT -->
  <div class="view active" id="view-chat">
    <div class="topbar">
      <div>
        <div class="topbar-title">Messages</div>
        <div class="topbar-sub" id="msg-count">chargement...</div>
      </div>
      <div class="topbar-right">
        <button onclick="toggleStickers()" style="background:none;border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:15px;color:var(--violet);font-weight:800;font-family:'Nunito',sans-serif">Stickers</button>
      </div>
    </div>

    <div id="messages"></div>

    <div class="typing-wrap" id="typing">
      <div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div>
      <div class="typing-name" id="typing-name">Alice écrit...</div>
    </div>

    <div class="input-area">
      <div class="emoji-strip" id="emoji-strip"></div>
      <div class="input-row">
        <textarea id="msg-input" rows="1" placeholder="Écris quelque chose..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>

  <!-- CAPSULE -->
  <div class="view" id="view-capsule">
    <div class="topbar">
      <div>
        <div class="topbar-title">Capsule temporelle</div>
        <div class="topbar-sub">un message scellé dans le temps</div>
      </div>
    </div>
    <div class="cap-inner">
      <div class="card">
        <div class="card-title">⏳ Écrire une capsule</div>
        <div class="cap-form">
          <textarea id="cap-msg" placeholder="Écris ton message pour le futur... il sera gardé secret jusqu'à la date choisie."></textarea>
          <div class="form-row">
            <div class="form-field">
              <div class="form-label">De</div>
              <select id="cap-from">
                <option value="alice">Alice</option>
                <option value="lenaic">Lénaïc</option>
              </select>
            </div>
            <div class="form-field">
              <div class="form-label">Pour</div>
              <select id="cap-to">
                <option value="both">Nous deux</option>
                <option value="alice">Alice</option>
                <option value="lenaic">Lénaïc</option>
              </select>
            </div>
            <div class="form-field">
              <div class="form-label">Ouvrir le</div>
              <input type="date" id="cap-date">
            </div>
          </div>
          <button class="seal-btn" onclick="sealCapsule()">⏳ Sceller la capsule</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📦 Capsules envoyées</div>
        <div class="caps-grid" id="caps-grid">
          <div class="empty-caps"><span>🌌</span>Aucune capsule pour l'instant...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let currentUser = null;

const QUICK_EMOJIS = ['😂','🥰','😭','✨','💫','🔥','🤩','👀','🫶','😮‍💨','🫠','💀','🥳','🤭','👑','🚀'];
const STICKERS = ['🎉','🥳','😍','🤭','💀','🫠','🤡','🫶','👁️','💋','👑','🪄','🌈','🎭','⭐','🚀','🦄','🍓','🫧','🌊','🍀','🎪'];

// ── LOGIN ──
function login(user) {
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('sb-av').textContent = user === 'alice' ? 'A' : 'L';
  document.getElementById('sb-name').textContent = user === 'alice' ? 'Alice' : 'Lénaïc';
  document.getElementById('cap-from').value = user;
  startApp();
}

function switchUser() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('messages').innerHTML = '';
  db.ref('messages').off();
  db.ref('typing').off();
  db.ref('capsules').off();
}

// ── INIT ──
function startApp() {
  // emoji strip
  const strip = document.getElementById('emoji-strip');
  strip.innerHTML = '';
  QUICK_EMOJIS.forEach(e => {
    const el = document.createElement('span');
    el.className = 'ep'; el.textContent = e;
    el.onclick = () => insertEmoji(e);
    strip.appendChild(el);
  });

  // sticker popup
  const popup = document.getElementById('sticker-popup');
  popup.innerHTML = '';
  STICKERS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'so'; el.textContent = s;
    el.onclick = () => { sendSticker(s); popup.classList.remove('open'); };
    popup.appendChild(el);
  });

  document.getElementById('cap-date').min = new Date().toISOString().split('T')[0];

  listenConnection();
  listenMessages();
  listenTyping();
  listenCapsules();
}

// ── CONNEXION ──
function listenConnection() {
  db.ref('.info/connected').on('value', snap => {
    const ok = snap.val();
    const dot = document.getElementById('live-dot');
    dot.className = 'live-dot' + (ok ? '' : ' off');
    document.getElementById('sb-status').textContent = ok ? 'en ligne' : 'reconnexion...';
    showToast(ok ? '✓ Connecté' : '✗ Connexion perdue');
  });
}

// ── MESSAGES ──
function listenMessages() {
  const ref = db.ref('messages').limitToLast(100);
  let firstLoad = true;

  ref.on('value', snap => {
    if (!firstLoad) return;
    firstLoad = false;
    document.getElementById('messages').innerHTML = '';
    addDateSep(new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' }));
    const val = snap.val();
    if (val) {
      Object.values(val).forEach(m => appendBubble(m.user, m.text, m.time, false));
      const c = Object.keys(val).length;
      document.getElementById('msg-count').textContent = `${c} message${c>1?'s':''} · Firebase 🔥`;
    } else {
      document.getElementById('msg-count').textContent = 'Aucun message encore';
    }
  });

  setTimeout(() => { firstLoad = false; }, 800);

  ref.on('child_added', snap => {
    if (firstLoad) return;
    const m = snap.val();
    appendBubble(m.user, m.text, m.time, true);
    db.ref('messages').once('value', s => {
      const c = s.numChildren();
      document.getElementById('msg-count').textContent = `${c} message${c>1?'s':''} · Firebase 🔥`;
    });
  });
}

function appendBubble(user, text, timeStr, animate) {
  const msgs = document.getElementById('messages');
  const isMe = user === currentUser;
  const g = document.createElement('div');
  g.className = 'msg-group ' + (isMe ? 'me' : 'other');
  const name = user === 'alice' ? 'Alice' : 'Lénaïc';
  g.innerHTML = `
    <div class="msg-sender">${name}</div>
    <div class="bubble"${animate ? '' : ' style="animation:none"'}>
      ${text}<span class="ts">${timeStr}</span>
    </div>
  `;
  msgs.appendChild(g);
  msgs.scrollTop = msgs.scrollHeight;
}

function addDateSep(text) {
  const el = document.createElement('div');
  el.className = 'date-sep'; el.textContent = text;
  document.getElementById('messages').appendChild(el);
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim(); if (!text) return;
  const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  db.ref('messages').push({ user: currentUser, text, time, ts: Date.now() });
  input.value = ''; input.style.height = 'auto';
  db.ref('typing/' + currentUser).set(false);
}

function sendSticker(s) {
  const time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  db.ref('messages').push({ user: currentUser, text: `<span style="font-size:38px">${s}</span>`, time, ts: Date.now() });
}

// ── TYPING ──
let typingTimer = null;
function onTyping() {
  if (!currentUser) return;
  db.ref('typing/' + currentUser).set(true);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => db.ref('typing/' + currentUser).set(false), 2500);
}

function listenTyping() {
  db.ref('typing').off();
  const other = currentUser === 'alice' ? 'lenaic' : 'alice';
  const otherName = other === 'alice' ? 'Alice' : 'Lénaïc';
  db.ref('typing/' + other).on('value', snap => {
    const ind = document.getElementById('typing');
    document.getElementById('typing-name').textContent = `${otherName} écrit...`;
    snap.val() ? ind.classList.add('visible') : ind.classList.remove('visible');
  });
}

// ── CAPSULES ──
function sealCapsule() {
  const msg = document.getElementById('cap-msg').value.trim();
  const from = document.getElementById('cap-from').value;
  const to = document.getElementById('cap-to').value;
  const dateVal = document.getElementById('cap-date').value;
  if (!msg || !dateVal) {
    showModal('⚠️', 'Oups !', 'Écris un message et choisis une date.', null);
    return;
  }
  db.ref('capsules').push({ msg, from, to, openTs: new Date(dateVal + 'T00:00:00').getTime(), createdAt: Date.now() });
  document.getElementById('cap-msg').value = '';
  document.getElementById('cap-date').value = '';
  const d = new Date(dateVal).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  showModal('⏳', 'Capsule scellée !', `Ton message sera révélé le ${d}.`, null);
}

function listenCapsules() {
  db.ref('capsules').on('value', snap => {
    const grid = document.getElementById('caps-grid');
    const val = snap.val();
    if (!val) {
      grid.innerHTML = '<div class="empty-caps"><span>🌌</span>Aucune capsule pour l\'instant...</div>';
      return;
    }
    const list = Object.entries(val).map(([k,v]) => ({key:k,...v})).sort((a,b) => b.createdAt - a.createdAt);
    const now = Date.now();
    grid.innerHTML = '';
    list.forEach(c => {
      const isOpen = now >= c.openTs;
      const toLabel = {both:'Nous deux', alice:'Alice', lenaic:'Lénaïc'}[c.to];
      const fromLabel = {alice:'Alice', lenaic:'Lénaïc'}[c.from];
      const dateStr = new Date(c.openTs).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
      const card = document.createElement('div');
      card.className = 'cap-card ' + (isOpen ? 'unlocked' : 'locked');
      card.innerHTML = `
        <div class="cap-card-icon">${isOpen ? '📬' : '🔒'}</div>
        <div class="cap-card-status">${isOpen ? '✓ Ouvert' : 'Scellé'}</div>
        <div class="cap-card-from">${fromLabel} → ${toLabel}</div>
        <div class="cap-card-date">${isOpen ? 'Ouvert le' : 'S\'ouvre le'} ${dateStr}</div>
        ${isOpen
          ? `<button class="open-cap-btn" onclick='readCapsule(${JSON.stringify(c)})'>Lire le message</button>`
          : `<div class="cap-card-hint">Scellé jusqu'à cette date</div>`
        }
      `;
      grid.appendChild(card);
    });
  });
}

function readCapsule(c) {
  const fromLabel = {alice:'Alice', lenaic:'Lénaïc'}[c.from];
  showModal('💌', `Message de ${fromLabel}`, 'Envoyé depuis le passé, pour toi.', c.msg);
}

// ── VIEWS ──
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v.substring(0,3)).classList.add('active');
}

// ── HELPERS ──
function insertEmoji(e) { const i = document.getElementById('msg-input'); i.value += e; i.focus(); }
function toggleStickers() { document.getElementById('sticker-popup').classList.toggle('open'); }
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  else onTyping();
}
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; onTyping(); }

function showModal(icon, title, body, msg) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const m = document.getElementById('modal-msg');
  if (msg) { m.textContent = msg; m.style.display = 'block'; } else { m.style.display = 'none'; }
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

let toastT;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#sticker-popup') && !e.target.closest('[onclick="toggleStickers()"]'))
    document.getElementById('sticker-popup').classList.remove('open');
  if (e.target === document.getElementById('modal')) closeModal();
});
</script>

</body>
</html>
